<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Весовые - выбор локации</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b141c; color: #f4f8fb; font-family: Arial, sans-serif; }
    main { width: min(520px, calc(100vw - 32px)); box-sizing: border-box; background: #152431; border: 1px solid #283d50; border-radius: 8px; padding: 28px; }
    h1 { margin: 0 0 18px; font-size: 24px; line-height: 1.2; }
    nav { display: grid; gap: 10px; }
    a { display: block; border-radius: 6px; background: #223445; color: #fff; padding: 14px 16px; text-decoration: none; font-weight: 700; }
    a:hover { background: #2b4256; }
    p { margin: 16px 0 0; color: #a7bfd0; line-height: 1.45; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>Весовые - выбор локации</h1>
    <nav>
      <a href="agroport/">Агропорт</a>
      <a href="kinel/">Кинельское ХПП</a>
      <a href="uralsky/">Уральский</a>
    </nav>
    <p>У каждой локации отдельный пароль и отдельный зашифрованный файл данных.</p>
  </main>
</body>
</html>
